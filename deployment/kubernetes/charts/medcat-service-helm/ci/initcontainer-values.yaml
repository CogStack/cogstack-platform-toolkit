env:
  APP_MEDCAT_MODEL_PACK: "/my/models/custom-model.zip"
volumeMounts:
  - name: model-volume
    mountPath: /my/models

volumes:
  - name: model-volume
    persistentVolumeClaim:
      claimName: medcat-model-pvc

extraInitContainers:
  - name: custom-init-container
    image: busybox:1.28
    command:
      [
        "sh",
        "-c",
        "wget -O /my/models/custom-model.zip https://github.com/CogStack/cogstack-nlp/raw/be9825f151da2d3b6faac80d49e5be91a1629c68/medcat-service/models/examples/example-medcat-v2-model-pack.zip",
      ]
    volumeMounts:
      - name: model-volume
        mountPath: /my/models

extraManifests:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: medcat-model-pvc
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 100Mi
